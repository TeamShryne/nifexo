name: Android Debug Fast Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

concurrency:
  group: android-debug-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug-fast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-cleanup: true

      - name: Set up Flutter with cache
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          cache-key: flutter-fast-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}

      - name: Cache build intermediates
        uses: actions/cache@v4
        with:
          path: |
            build/app/intermediates
            build/app/outputs/flutter-apk
            ~/.pub-cache
          key: fast-intermediates-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            fast-intermediates-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Precache Android artifacts
        run: flutter precache --android

      - name: Build debug APK
        run: |
          # Fast build: Disable multi-dex, use only one architecture, skip unnecessary tasks
          flutter build apk --debug --target-platform android-arm64 --no-pub

      - name: Upload fast debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nifexo-android-debug-fast-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
